catalog: null
schema: default
sql: "select \nbc.bet_id as bet_id, \nbc.outcome_id as outcome_id,\nbc.bet_odds,\n\
  bc.event_id,\nbc.event_name,\nbc.event_start_time,\nbc.outcome_odds,\nbc.market_id,\n\
  bc.market_name,\nbc.sport_id,\nbc.sport_name,\nbc.provider_name, \nbc.region_name,\n\
  bc.outcome_sport_service,\nbc.outcome_status,\nbc.tournament_name,\nbc.outcomes_count,\n\
  bc.project_id as project_id,\nbc.sport_service,\nbc.bet_status,\nbc.create_time,\n\
  bc.update_time as update_time,\nbc.outcome_name,\nbc.test_mode as is_test_bet,\n\
  bc.client_fin_category,\nbc.market_grade,\nbc.currency as currency,\nbld.amount,\
  \ \nbld.amount_bc,\nbld.win_amount as win_amount,\nbld.win_amount_bc as win_amount_bc,\n\
  p.name as project_name,\nc.login as client_login,\nc.phone as client_phone_number,\n\
  c.email as client_email,\nc.btag as BTAG,\nc.first_name,\nc.last_name,\nc.is_test\
  \ as client_is_test,\nc.is_verified as client_is_verified,\nc.status as client_status,\n\
  c.country as client_country,\nbc.client_id as client_id,\ncase when bc.bet_amount\
  \ < 100 then 'less than 1'\nwhen bc.bet_amount >= 100 and bc.bet_amount < 500 then\
  \ '1-5'\nwhen bc.bet_amount >= 500 and bc.bet_amount < 1000 then '5-10'\nwhen bc.bet_amount\
  \ >= 1000 and bc.bet_amount < 2000 then '10-20'\nwhen bc.bet_amount >= 2000 and\
  \ bc.bet_amount < 5000 then '20-50'\nwhen bc.bet_amount >= 5000 and bc.bet_amount\
  \ < 10000 then '50-100'\nwhen bc.bet_amount >= 10000 and bc.bet_amount < 50000 then\
  \ '100-500'\nwhen bc.bet_amount >= 50000 then 'more than 500'\nend as bet_amount_range,\n\
  case when bc.bet_amount_bc < 100 then 'less than 1'\nwhen bc.bet_amount_bc >= 100\
  \ and bc.bet_amount_bc < 500 then '1-5'\nwhen bc.bet_amount_bc >= 500 and bc.bet_amount_bc\
  \ < 1000 then '5-10'\nwhen bc.bet_amount_bc >= 1000 and bc.bet_amount_bc < 2000\
  \ then '10-20'\nwhen bc.bet_amount_bc >= 2000 and bc.bet_amount_bc < 5000 then '20-50'\n\
  when bc.bet_amount_bc >= 5000 and bc.bet_amount_bc < 10000 then '50-100'\nwhen bc.bet_amount_bc\
  \ >= 10000 and bc.bet_amount_bc < 50000 then '100-500'\nwhen bc.bet_amount_bc >=\
  \ 50000 then 'more than 500'\nend as bet_amount_range_eur,\nc.registration_time\
  \ as client_registration_time,\nbc.settlement_time,\nbc.money_balance_type,\ne.new_status\
  \ as event_status\nfrom project_0.bet_change bc final\njoin project_0.bet_liability_distribution\
  \ bld final on bld.bet_id  = bc.bet_id and bld.outcome_id = bc.outcome_id \njoin\
  \ project_0.project p final on p.id = bc.project_id\njoin project_0.client c final\
  \ on c.client_id = bc.client_id\nleft join project_0.event e final on e.event_id\
  \ = bc.event_id"
