sql: "SELECT \nca.client_id as client_id, \nca.project_id as project_id, \ndictGet('project_0.project_dict',\
  \ 'name', ca.project_id) as project_name,\nca.integrator_id as integrator_id,\n\
  dictGet('project_0.casino_integrator_dict', 'name', ca.integrator_id) as intergrator_name,\n\
  ca.provider_id as provider_id, \ndictGet('project_0.casino_provider_dict', 'name',\
  \ ca.provider_id::UInt64) as provider_name,\nca.game_id, \ndictGet('project_0.casino_game_dict',\
  \ 'name', ca.game_id::UInt64) as game_name,\nca.dt as spin_date,\nca.currency as\
  \ currency, \nca.spin_count, \nca.turnover, \nca.turnover_bc, \nca.payout, \nca.payout_bc,\
  \ \nca.ggr, \nca.ggr_bc,\nca.is_free_spin,\nca.game_type,\nca.money_balance_type,\n\
  c.login as client_login,\nc.btag as BTAG,\nc.first_name,\nc.last_name,\nc.phone\
  \ as client_phone_number,\nc.email as client_email,\nc.is_test as client_is_test,\n\
  c.is_verified as client_is_verified,\nc.status as client_status,\nc.country as client_country,\n\
  c.registration_time as client_registration_time\nFROM silver.casino ca \nleft join\
  \ project_0.client c final on c.client_id = ca.client_id"
