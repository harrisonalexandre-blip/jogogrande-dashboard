sql: "SELECT pa.id as id,\r\n       pa.client_id as client_id,\r\n       pa.currency\
  \ as currency,\r\n       pa.amount as amount,\r\n       pa.amount_bc as amount_bc,\r\
  \n       pa.status as status,\r\n       pa.transaction as transaction,\r\n     \
  \  dictGet('project_0.payment_method_dict', 'name',  pa.method_id) as method_name,\r\
  \n       pa.method_id as method_id,\r\n       dictGet('project_0.project_dict',\
  \ 'name',  pa.project_id) as project_name,\r\n       pa.project_id as project_id,\r\
  \n       pa.provider_type as provider_type,\r\n       pa.create_time as create_time,\r\
  \n       pa.test_payment as test_payment,\r\n       pa.type as payment_type,\r\n\
  \       pa.payment_order_number as paymnet_order_number,\r\n       pa.update_time\
  \ as update_time,\r\n       c.first_name as first_name,\r\n       c.last_name as\
  \ last_name,\r\n       c.btag as BTAG,\r\n       c.phone as client_phone_number,\r\
  \n       c.email as client_email,\r\n       c.is_test as client_is_test,\r\n\t \
  \    c.is_verified as client_is_verified,\r\n       c.status as client_status,\r\
  \n       c.country as client_country,\r\n       c.registration_time as client_registration_time,\r\
  \n       case when payment_order_number = 1 then True else False end as is_first_deposit,\r\
  \n       case when payment_order_number = 1 and type = 'DEPOSIT' then pa.amount_bc\
  \ end as first_deposit_amount_bc\r\nFROM project_0.payment pa final\r\n  join project_0.client\
  \ c final on c.client_id = pa.client_id"
