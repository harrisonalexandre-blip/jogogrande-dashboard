sql: "SELECT \r\ncb.wallet_id as Wallet_ID,\r\ncb.project_id as project_id,\r\ndictGet('project_0.project_dict',\
  \ 'name', cb.project_id) as project_name,\r\ncb.client_id as Client_ID,\r\ncb.currency\
  \ As Client_Currency,\r\ncb.amount as Client_Real_Balance,\r\ncb.bonus_amount as\
  \ Client_Bonus_balance,\r\ncb.create_time as Wallet_CreateTime,\r\ncb.update_time\
  \ as Wallet_UpdateTime,\r\nc.is_test as client_is_test,\r\nc.status as client_status\r\
  \nFROM project_0.client_balance cb final\r\nleft join project_0.client c final on\
  \ c.client_id = cb.client_id"
